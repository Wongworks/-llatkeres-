<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Kódolvasó</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="icons.css">
</head>

<body class="game-page coordinate-game">

<header class="game-topbar">

  <a
    class="topbar-button topbar-back"
    href="index.html"
    title="Vissza a játékokhoz"
    aria-label="Vissza a játékokhoz"
    data-icon="back"
  ></a>

  <div class="game-title-panel">

    <div
      class="game-title-mascot"
      data-icon="coordinate"
      aria-hidden="true"
    ></div>

    <div class="game-title-text">
      <h1>Kódolvasó</h1>
      <p>Olvasd le az állat helyét!</p>
    </div>

  </div>

  <button
    class="topbar-button topbar-shuffle"
    onclick="newBoard()"
    title="Új pálya"
    aria-label="Új pálya"
    data-icon="shuffle"
  ></button>

</header>

<div class="coordinate-layout">

  <div class="coordinate-left">

    <div id="task"></div>

    <div id="answerArea" class="coordinate-answer">

      <div id="selectedCode" class="selected-code">__</div>

      <div class="coordinate-choice-columns">

        <div class="coordinate-choice-column">
          <button class="answer-btn letter-btn" data-value="A">A</button>
          <button class="answer-btn letter-btn" data-value="B">B</button>
          <button class="answer-btn letter-btn" data-value="C">C</button>
          <button class="answer-btn letter-btn" data-value="D">D</button>
          <button class="answer-btn letter-btn" data-value="E">E</button>
        </div>

        <div class="coordinate-choice-column">
          <button class="answer-btn number-btn" data-value="1">1</button>
          <button class="answer-btn number-btn" data-value="2">2</button>
          <button class="answer-btn number-btn" data-value="3">3</button>
          <button class="answer-btn number-btn" data-value="4">4</button>
          <button class="answer-btn number-btn" data-value="5">5</button>
          <button class="answer-btn number-btn" data-value="6">6</button>
          <button class="answer-btn number-btn" data-value="7">7</button>
        </div>

      </div>

    </div>

  </div>

  <div class="coordinate-right">

    <div class="board-shell">
      <div id="board"></div>
    </div>

  </div>

</div>

<p id="message"></p>

<script src="icons.js"></script>
<script src="common.js"></script>
<script src="kodolvaso.js"></script>

</body>
</html>
