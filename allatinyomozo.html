<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Állati nyomozó</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="icons.css">
</head>

<body class="game-page detective-game">

<header class="game-topbar">
  <a
    class="topbar-button topbar-back"
    href="index.html"
    title="Vissza a játékokhoz"
    aria-label="Vissza a játékokhoz"
    data-icon="back"
  ></a>

  <div class="game-title-panel">
    <div class="game-title-mascot detective-title-icon" aria-hidden="true">🐾</div>

    <div class="game-title-text">
      <h1>Állati nyomozó</h1>
      <p>Találd meg, melyik állathoz tartozik!</p>
    </div>
  </div>

  <button
    class="topbar-button topbar-shuffle"
    onclick="newBoard()"
    title="Új pálya"
    aria-label="Új pálya"
    data-icon="shuffle"
  ></button>
</header>

<div id="task"></div>
<p id="message"></p>

<div class="detective-board-shell">
  <div id="board" class="detective-board"></div>
</div>

<script src="icons.js"></script>
<script src="common.js"></script>
<script src="allatinyomozo.js"></script>

</body>
</html>
