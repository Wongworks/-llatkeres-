<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Igaz vagy hamis?</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="icons.css">
</head>

<body class="game-page truth-game">

<header class="game-topbar">

  <a
    class="topbar-button topbar-back"
    href="index.html"
    title="Vissza a játékokhoz"
    aria-label="Vissza a játékokhoz"
    data-icon="back"
  ></a>

  <div class="game-title-panel">

    <div
      class="game-title-mascot"
      data-icon="truth"
      aria-hidden="true"
    ></div>

    <div class="game-title-text">
      <h1>Igaz vagy hamis?</h1>
      <p>Figyeld meg, és dönts!</p>
    </div>

  </div>

  <button
    class="topbar-button topbar-shuffle"
    onclick="newBoard()"
    title="Új pálya"
    aria-label="Új pálya"
    data-icon="shuffle"
  ></button>

</header>

<div id="task"></div>

<div class="truth-controls">

<button
  id="speakButton"
  class="speak-button"
  onclick="speakCurrentStatement()"
  title="Feladat meghallgatása"
  aria-label="Feladat meghallgatása"
>
  🔊
</button>

  <div class="truth-answer-row">

    <button
      class="truth-button true-button"
      data-answer="true"
      onclick="answerStatement(true, this)"
    >
      <span class="truth-icon">✅</span>
      <span>IGAZ</span>
    </button>

    <button
      class="truth-button false-button"
      data-answer="false"
      onclick="answerStatement(false, this)"
    >
      <span class="truth-icon">❌</span>
      <span>HAMIS</span>
    </button>

  </div>

</div>

<p id="message"></p>

<div class="board-shell">
  <div id="board"></div>
</div>

<script src="icons.js"></script>
<script src="common.js"></script>
<script src="igazhamis.js"></script>

</body>
</html>
