<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Állatos játékok</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="icons.css">
</head>

<body class="home-page">

<div class="container">

  <a
    class="settings-button"
    href="beallitasok.html"
    title="Beállítások"
  >
    ⚙️
  </a>

 <div class="home-heading">

  <div class="heading-animal heading-animal-left">
    🦊
  </div>

  <div class="heading-text">
    <div class="heading-paws">🐾 🐾 🐾</div>

    <h1>Állati kalandok</h1>

    <p class="subtitle">
      Fedezd fel az állatok világát!
    </p>
  </div>

  <div class="heading-animal heading-animal-right">
    🐰
  </div>

</div>

  <div class="menu">

  <button class="card green" onclick="openModeModal()">
    <div class="emoji">🔍🐶</div>
    <div class="title">Keresd meg<br>az állatot</div>
    <div class="card-hint">Nézd meg jól!</div>
  </button>

  <button class="card blue" onclick="openCodeModal()">
    <div class="emoji">🧭🦁</div>
    <div class="title">Kódvadász</div>
    <div class="card-hint">Fejtsd meg a kódot!</div>
  </button>

  <button
    class="card orange"
    onclick="location.href='kodolvaso.html'"
  >
    <div class="emoji">🗺️🐱</div>
    <div class="title">Kódolvasó</div>
    <div class="card-hint">Találd meg a helyét!</div>
  </button>

  <button class="card purple" onclick="openArrowModal()">
    <div class="emoji">➡️🐰</div>
    <div class="title">Kövesd a<br>nyilakat!</div>
    <div class="card-hint">Merre vezet az út?</div>
  </button>

  <button
    class="card red"
    onclick="location.href='igazhamis.html'"
  >
    <div class="emoji">❓🐸</div>
    <div class="title">Igaz vagy<br>hamis?</div>
    <div class="card-hint">Fejtsd meg a jeleket!</div>
  </button>

  <button
    class="card yellow"
    onclick="location.href='allathangok.html'"
  >
    <div class="emoji">🔊🐓</div>
    <div class="title">Állathangok</div>
    <div class="card-hint">Ki lehet az?</div>
  </button>

  <button
    class="card turquoise"
    onclick="openSorterModal()"
  >
    <div class="emoji">🧺🐿️</div>
    <div class="title">Állatválogató</div>
    <div class="card-hint">Válogasd szét őket!</div>
  </button>

</div>

<!-- KERESD MEG AZ ÁLLATOT MÓDVÁLASZTÓ -->

<div id="modeModal" class="modal">
  <div class="modal-box adventure-modal green-modal">

    <div class="modal-decoration modal-decoration-left">🌿</div>
    <div class="modal-decoration modal-decoration-right">🐾</div>

    <div class="modal-mascot">🦊</div>

    <h2>Keresd meg az állatot</h2>
    <p class="modal-question">Melyik kalandot választod?</p>

    <button
      class="mode-btn mano"
      onclick="startGame('mano')"
    >
      <span class="mode-icon">🧸</span>

      <span class="mode-content">
        <strong>Manó mód</strong>
        <small>Kép alapján keresés</small>
      </span>

      <span class="mode-arrow">➜</span>
    </button>

    <button
      class="mode-btn olvaso"
      onclick="startGame('olvaso')"
    >
      <span class="mode-icon">📚</span>

      <span class="mode-content">
        <strong>Olvasó mód</strong>
        <small>Szó alapján keresés</small>
      </span>

      <span class="mode-arrow">➜</span>
    </button>

    <button class="close-btn" onclick="closeModeModal()">
      🌿 Mégsem
    </button>

  </div>
</div>

<!-- KÓDVADÁSZ MÓDVÁLASZTÓ -->

<!-- KÓDVADÁSZ MÓDVÁLASZTÓ -->

<div id="codeModal" class="modal">
  <div class="modal-box adventure-modal blue-modal">

    <div class="modal-decoration modal-decoration-left">🔐</div>
    <div class="modal-decoration modal-decoration-right">🐾</div>

    <div class="modal-mascot">🦝</div>

    <h2>Kódvadász</h2>
    <p class="modal-question">Melyik küldetést választod?</p>

    <button
      class="mode-btn mano"
      onclick="startCodeGame('kodkereso')"
    >
      <span class="mode-icon">🌱</span>

      <span class="mode-content">
        <strong>Kódkereső</strong>
        <small>Egy kód alapján keresés</small>
      </span>

      <span class="mode-arrow">➜</span>
    </button>

    <button
      class="mode-btn olvaso"
      onclick="startCodeGame('kodfejto')"
    >
      <span class="mode-icon">🕵️</span>

      <span class="mode-content">
        <strong>Kódfejtő</strong>
        <small>Több kód megfejtése</small>
      </span>

      <span class="mode-arrow">➜</span>
    </button>

    <button
      class="mode-btn kod-osveny"
      onclick="startCodeGame('kodosveny')"
    >
      <span class="mode-icon">🐍</span>

      <span class="mode-content">
        <strong>Kódösvény</strong>
        <small>6–8 kód követése sorrendben</small>
      </span>

      <span class="mode-arrow">➜</span>
    </button>

    <button class="close-btn" onclick="closeCodeModal()">
      💧 Mégsem
    </button>

  </div>
</div>

<!-- KÖVESD A NYILAKAT MÓDVÁLASZTÓ -->

<!-- KÖVESD A NYILAKAT MÓDVÁLASZTÓ -->

<div id="arrowModal" class="modal">
  <div class="modal-box adventure-modal purple-modal">

    <div class="modal-decoration modal-decoration-left">🍂</div>
    <div class="modal-decoration modal-decoration-right">⭐</div>

    <div class="modal-mascot">🐿️</div>

    <h2>Kövesd a nyilakat</h2>
    <p class="modal-question">Melyik ösvényen indulsz el?</p>

    <button
      class="mode-btn mano"
      onclick="startArrowGame('egyenes')"
    >
      <span class="mode-icon">🌱</span>

      <span class="mode-content">
        <strong>Egyenes ösvény</strong>
        <small>Fel, le, jobbra és balra</small>
      </span>

      <span class="mode-arrow">➜</span>
    </button>

    <button
      class="mode-btn olvaso"
      onclick="startArrowGame('kalandos')"
    >
      <span class="mode-icon">⭐</span>

      <span class="mode-content">
        <strong>Kalandos ösvény</strong>
        <small>Átlós irányokkal is</small>
      </span>

      <span class="mode-arrow">➜</span>
    </button>

    <button class="close-btn" onclick="closeArrowModal()">
      🍂 Mégsem
    </button>

  </div>
</div>

<!-- ÁLLATVÁLOGATÓ MÓDVÁLASZTÓ -->

<div id="sorterModal" class="modal">
  <div class="modal-box adventure-modal turquoise-modal">

    <div class="modal-decoration modal-decoration-left">🧺</div>
    <div class="modal-decoration modal-decoration-right">✨</div>

    <div class="modal-mascot">🐻</div>

    <h2>Állatválogató</h2>
    <p class="modal-question">Melyik válogatást választod?</p>

    <button
      class="mode-btn mano"
      onclick="startSorterGame('konnyu')"
    >
      <span class="mode-icon">🧸</span>

      <span class="mode-content">
        <strong>Könnyű válogatás</strong>
        <small>Jól megfigyelhető tulajdonságok</small>
      </span>

      <span class="mode-arrow">➜</span>
    </button>

    <button
      class="mode-btn olvaso"
      onclick="startSorterGame('szakerto')"
    >
      <span class="mode-icon">🔬</span>

      <span class="mode-content">
        <strong>Állatszakértő</strong>
        <small>Állatcsoportok és állattani fogalmak</small>
      </span>

      <span class="mode-arrow">➜</span>
    </button>

    <button class="close-btn" onclick="closeSorterModal()">
      ✨ Mégsem
    </button>

  </div>
</div>

<script>
function openModeModal() {
  document.getElementById("modeModal").style.display = "flex";
}

function closeModeModal() {
  document.getElementById("modeModal").style.display = "none";
}

function startGame(mode) {
  localStorage.setItem("animalGameMode", mode);
  location.href = "keresd.html";
}

function openCodeModal() {
  document.getElementById("codeModal").style.display = "flex";
}

function closeCodeModal() {
  document.getElementById("codeModal").style.display = "none";
}

function startCodeGame(mode) {
  localStorage.setItem("codeGameMode", mode);
  location.href = "kodvadasz.html";
}

function openArrowModal() {
  document.getElementById("arrowModal").style.display = "flex";
}

function closeArrowModal() {
  document.getElementById("arrowModal").style.display = "none";
}

function startArrowGame(mode) {
  localStorage.setItem("arrowGameMode", mode);
  location.href = "nyilak.html";
}

function openSorterModal() {
  document.getElementById("sorterModal").style.display =
    "flex";
}

function closeSorterModal() {
  document.getElementById("sorterModal").style.display =
    "none";
}

function startSorterGame(mode) {
  localStorage.setItem("sortingGameMode", mode);
  location.href = "allatvalogato.html";
}
</script>

</body>
</html>
