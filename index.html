<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Állatos játékok</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <a
  class="settings-button"
  href="beallitasok.html"
  title="Beállítások"
>
  ⚙️
</a>

  <h1>🐾 Állatos játékok</h1>
  <p class="subtitle">Válassz egy játékot!</p>

  <div class="menu">
    <button class="card green" onclick="openModeModal()">
      <div class="emoji">🎯</div>
      <div class="title">Keresd meg<br>az állatot</div>
    </button>

    <button class="card blue" onclick="openCodeModal()">
      <div class="emoji">🧭</div>
      <div class="title">Kódvadász</div>
    </button>

    <button class="card orange" onclick="location.href='kodolvaso.html'">
      <div class="emoji">🗺️</div>
      <div class="title">Kódolvasó</div>
    </button>

    <button class="card purple" disabled>
      <div class="emoji">➡️</div>
      <div class="title">Kövesd a<br>nyilakat!</div>
    </button>

    <button class="card red" disabled>
      <div class="emoji">✔️</div>
      <div class="title">Igaz vagy<br>hamis?</div>
    </button>

    <button class="card yellow" disabled>
      <div class="emoji">🔊</div>
      <div class="title">Állathangok</div>
    </button>
  </div>
</div>

<div id="modeModal" class="modal">
  <div class="modal-box">
    <h2>🎯 Keresd meg az állatot</h2>
    <p>Melyik módban szeretnél játszani?</p>

    <button class="mode-btn mano" onclick="startGame('mano')">
      🧸 Manó mód
      <span>kép alapján keresés</span>
    </button>

    <button class="mode-btn olvaso" onclick="startGame('olvaso')">
      📚 Olvasó mód
      <span>szó alapján keresés</span>
    </button>

    <button class="close-btn" onclick="closeModeModal()">Mégsem</button>
  </div>
</div>

<div id="codeModal" class="modal">
  <div class="modal-box">
    <h2>🧭 Kódvadász</h2>
    <p>Melyik módban szeretnél játszani?</p>

    <button class="mode-btn mano" onclick="startCodeGame('kodkereso')">
      🌱 Kódkereső
      <span>egy kód alapján keresés</span>
    </button>

    <button class="mode-btn olvaso" onclick="startCodeGame('kodfejto')">
      🕵️ Kódfejtő
      <span>több kód követése</span>
    </button>

    <button class="mode-btn kod-osveny" onclick="startCodeGame('kodosveny')">
      🐍 Kódösvény
      <span>6–8 kód követése sorrendben</span>
    </button>

    <button class="close-btn" onclick="closeCodeModal()">Mégsem</button>
  </div>
</div>

<script>
function openModeModal() {
  document.getElementById("modeModal").style.display = "flex";
}

function closeModeModal() {
  document.getElementById("modeModal").style.display = "none";
}

function startGame(mode) {
  localStorage.setItem("animalGameMode", mode);
  location.href = "keresd.html";
}

function openCodeModal() {
  document.getElementById("codeModal").style.display = "flex";
}

function closeCodeModal() {
  document.getElementById("codeModal").style.display = "none";
}

function startCodeGame(mode) {
  localStorage.setItem("codeGameMode", mode);
  location.href = "kodvadasz.html";
}
</script>
</body>
</html>
