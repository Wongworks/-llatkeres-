<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Állatkereső</title>

<style>
#board {
  display: grid;
  grid-template-columns: repeat(6, 80px);
  grid-auto-rows: 80px;
  gap: 6px;
  justify-content: center;
  margin-top: 20px;
}

.header {
  width: 80px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  background: #eee;
  border: 2px solid #333;
}

body {
  font-family: Arial;
  background: #fff6d6;
  text-align: center;
}
.cell {
  width: 80px;
  height: 80px;
  border: 2px solid #333;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  background: white;
  cursor: pointer;
  transition: all 0.2s ease;
}
/* HELYES */
.correct {
  background: #4CAF50 !important;
  color: white !important;
  transform: scale(1.2);
  box-shadow: 0 0 10px rgba(0,255,0,0.5);
}

/* HIBÁS */
.wrong {
  background: #f44336 !important;
  color: white !important;
  animation: shake 0.3s;
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
  100% { transform: translateX(0); }
}
h1, h2, p {
  text-align: center;
}
</style>
</head>

<body>

<h1>🐾 Állatkereső</h1>

<h2 id="task"></h2>
<p id="message"></p>

<div id="board"></div>

<script src="script.js"></script>

</body>
</html>
